name: Mobile Build (APK)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.1)'
        required: true
        type: string
      profile:
        description: 'Build profile'
        required: true
        type: choice
        options:
          - production
          - preview

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        working-directory: mobile
        run: |
          eas build --platform android --profile ${{ inputs.profile }} \
            --non-interactive \
            --message "Release ${{ inputs.version }}"
