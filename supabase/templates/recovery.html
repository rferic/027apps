<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="es">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña</title>
</head>
<body style="background-color:#f1f5f9; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; margin:0; padding:0;">
  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color:#f1f5f9;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table border="0" cellpadding="0" cellspacing="0" width="520" style="background-color:#ffffff; border-radius:12px; border:1px solid #e2e8f0;">

          <!-- Top bar -->
          <tr>
            <td style="background-color:#0f172a; height:4px; font-size:1px; line-height:1px;" colspan="3">&nbsp;</td>
          </tr>

          <!-- Logo -->
          <tr>
            <td align="center" style="padding:32px 32px 0;" colspan="3">
              <table border="0" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center">
                    <img src="{{ .SiteURL }}/logo-icon.png" alt="027Apps" width="80" height="80" style="display:block;" />
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td align="center" style="padding:24px 32px 0; color:#0f172a; font-size:22px; font-weight:700;" colspan="3">
              ¿Olvidaste tu contraseña?
            </td>
          </tr>

          <!-- Description -->
          <tr>
            <td align="center" style="padding:12px 32px 0; color:#475569; font-size:14px; line-height:1.6;" colspan="3">
              Recibimos una solicitud para restablecer la contraseña de tu cuenta en 027Apps.
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding:24px 32px 0;" colspan="3">
              <table border="0" cellpadding="0" cellspacing="0" align="center">
                <tr>
                  <td align="center" style="border-radius:8px;">
                    <a href="{{ .ConfirmationURL }}" style="background-color:#0f172a; border-radius:8px; color:#ffffff; display:inline-block; font-size:14px; font-weight:600; padding:13px 32px; text-decoration:none; text-align:center;">
                      Restablecer contraseña
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Expiry note -->
          <tr>
            <td align="center" style="padding:16px 32px 0; color:#94a3b8; font-size:12px; line-height:1.5;" colspan="3">
              Este enlace expira en 1 hora. Si no solicitaste este cambio, ignora este mensaje.
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:24px 32px 0;" colspan="3">
              <table border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td style="height:1px; background-color:#e2e8f0; font-size:1px; line-height:1px;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding:16px 32px 32px; color:#94a3b8; font-size:12px; line-height:1.5;" colspan="3">
              Enviado desde 027Apps<br />
              &copy; 2026 027Apps. Todos los derechos reservados.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
